name: Teedy CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Maven install (build and install modules)
      run: mvn clean install -DskipTests

    - name: PMD Code Check
      run: mvn pmd:pmd

    - name: Run Tests
      run: mvn test -Dmaven.test.failure.ignore=true

    - name: Generate Test Report
      run: mvn surefire-report:report-only -Dmaven.test.failure.ignore=true

    - name: Upload Test Reports
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: |
          **/target/site/surefire-report.html
          **/target/surefire-reports/*.xml

    - name: Generate JavaDoc JAR
      run: mvn javadoc:jar -Dmaven.javadoc.failOnError=false

    - name: Package JAR
      run: mvn package -DskipTests -Dmaven.javadoc.skip=true

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: teedy-artifacts
        path: |
          **/target/*.jar
          **/target/*-javadoc.jar
